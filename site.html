<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Minha Loja</h1>
    </header>
    <nav>
        <ul>
           <li>Início</li>
           <li>Produtos</li>
        </ul>
        <label for="buscar">Buscar</label>
        <input type="text" name="" id="">
        <button type="submit">Buscar</button>
    </nav>
    <hr>
    <main>
        <section>
            <h2>Seja bem-vindo!</h2>
            <img src="https://static.netshoes.com.br/produtos/camisa-brasil-nike-i-202627-fa-masculina/46/SGL-052E-046/SGL-052E-046_zoom1.jpg?ts=1776337483" alt="camisa do brasil" width="250" height="250">
        </section>
        
        <section>
            <h2>Categorias</h2>
            <ul>
                <li>Camisas</li>
                <li>Shorts</li>
                <li>Chuteiras</li>
                <li>Acessórios</li>
            </ul>
        </section>

        <section>
            <h2>Produtos</h2>
            <table border="1">
                <tr>
                    <th>Produto</th>
                    <th>Valor</th>
                    <th>Imagem</th>
                </tr>
                
                <tr>
                    <td>Camisa</td>
                    <td>R$ 100,00</td>
                    <td><img src="https://static.netshoes.com.br/produtos/camisa-brasil-nike-i-202627-fa-masculina/46/SGL-052E-046/SGL-052E-046_zoom1.jpg?ts=1776337483" alt="camisa do brasil" width="100" height="100"></td>
                </tr>
            </table>
        </section>

        <section>
            <h2>Fale Conosco</h2>
            <label for="Nome">Nome:</label>
            <input type="text" name="Nome" id="Nome" required><br>
            <label for="Email">Email:</label>
            <input type="email" name="Email" id="Email" required><br>
            <label for="Mensagem">Mensagem:</label><br>
            <textarea name="Mensagem" id="Mensagem" required></textarea><br>
            <button type="submit">Enviar</button>
        </section>

    </main>
    <footer>
        <h2>Redes Sociais</h2>
        <ul>
            <li><a href="https://www.facebook.com/" target="_blank">Facebook</a></li>
            <li><a href="https://www.instagram.com/" target="_blank">Instagram</a></li>
            <li><a href="https://www.twitter.com/" target="_blank">Twitter</a></li>
        </ul>
    </footer>
    </main>
</body>
</html>
